baseURL = "https://laither.com/"
title = "Laither 叠时"
theme = "hello-friend-ng"
defaultContentLanguage = "zh-cn"

PygmentsCodeFences = true
PygmentsStyle = "monokai"

enableRobotsTXT = true
enableEmoji = true

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[pagination]
  pagerSize = 10

[permalinks]
  posts = "/posts/:year/:month/:title/"

[taxonomies]
  tag = "tags"
  category = "categories"

[params]
  dateform = "2006-01-02"
  showMenuItems = 4
  themeColor = "#1a1a1a"
  EnableGlobalLanguageMenu = true
  EnableReadingTime = true
  dateformNumTime = "2006-01-02 15:04"

  [params.author]
    name = "王磊"

  [params.logo]
    logoText = "Laither"
    logoHomeLink = "/"

  [params.favicon]
    mask = "#87ff1f"
    msapplication = "#1a1a1a"

# ---- zh-cn (default) ----
[languages.zh-cn]
  locale = "zh-cn"
  label = "中文"
  weight = 1
  title = "Laither 叠时"

  [languages.zh-cn.params]
    description = "王磊的个人工作室 · 软件开发 · 技术笔记 · 产品作品"
    homeSubtitle = "全栈工程师 · 个人产品 · 技术沉淀"
    keywords = "Laither,王磊,个人博客,全栈工程师,Hugo,技术笔记"

  [[languages.zh-cn.menu.main]]
    identifier = "posts"
    name = "博客"
    url = "/posts/"
    weight = 10

  [[languages.zh-cn.menu.main]]
    identifier = "works"
    name = "作品"
    url = "/works/"
    weight = 20

  [[languages.zh-cn.menu.main]]
    identifier = "about"
    name = "关于"
    url = "/about/"
    weight = 30

  [[languages.zh-cn.menu.main]]
    identifier = "tags"
    name = "标签"
    url = "/tags/"
    weight = 40

  [[languages.zh-cn.menu.main]]
    identifier = "search"
    name = "搜索"
    url = "/search/"
    weight = 50

