baseURL = "https://laither.com/"
languageCode = "zh-cn"
title = "Laither 叠时"
theme = "hello-friend-ng"
defaultContentLanguage = "zh-cn"

PygmentsCodeFences = true
PygmentsStyle = "monokai"

enableRobotsTXT = true
enableEmoji = true

[pagination]
  pagerSize = 10

[permalinks]
  posts = "/posts/:year/:month/:title/"

[taxonomies]
  tag = "tags"
  category = "categories"

[params]
  dateform = "2006-01-02"
  description = "王磊的个人工作室 · 软件开发 · 技术笔记 · 产品作品"
  homeSubtitle = "全栈工程师 · 个人产品 · 技术沉淀"
  showMenuItems = 4

  [params.author]
    name = "王磊"

  [params.logo]
    logoText = "Laither"
    logoHomeLink = "/"

