{{ define "main" }}
<div class="content">
    <main class="post landing-page">
        <article>
            <h1 class="post-title landing-title">{{ .Title | markdownify }}</h1>
            <div class="post-content landing-content">
                {{ .Content }}
            </div>
        </article>
    </main>
</div>

<style>
/* Landing 页专用样式 · 叠加在主题 scss 之上 */
.landing-page {
  max-width: 920px;
  margin: 0 auto;
}

.landing-title {
  text-align: center;
  font-size: 2.5rem;
  margin-top: 2rem;
  margin-bottom: 1rem;
  letter-spacing: -0.5px;
}

.landing-content h2 {
  margin-top: 3rem;
  border-bottom: 1px dashed var(--accent, #FF8700);
  padding-bottom: 0.3rem;
}

.landing-content hr {
  margin: 3rem 0;
  border: none;
  text-align: center;
}

.landing-content hr::before {
  content: "···";
  letter-spacing: 0.8rem;
  color: var(--accent, #FF8700);
  font-size: 1.5rem;
}

.landing-features {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 1.5rem;
  margin: 2rem 0;
}

.landing-feature-card {
  border: 1px solid rgba(128, 128, 128, 0.3);
  border-radius: 8px;
  padding: 1.5rem;
  transition: border-color 0.2s, transform 0.2s;
}

.landing-feature-card:hover {
  border-color: var(--accent, #FF8700);
  transform: translateY(-2px);
}

.landing-feature-icon {
  font-size: 2rem;
  margin-bottom: 0.5rem;
}

.landing-feature-title {
  font-size: 1.15rem;
  font-weight: 600;
  margin-bottom: 0.5rem;
  color: var(--accent, #FF8700);
}

.landing-feature-desc {
  font-size: 0.95rem;
  line-height: 1.5;
  margin-bottom: 0.5rem;
}

.landing-feature-note {
  font-size: 0.82rem;
  opacity: 0.7;
  font-style: italic;
}

.landing-pricing {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 1.5rem;
  margin: 2rem 0;
}

.landing-price-card {
  border: 1px solid rgba(128, 128, 128, 0.3);
  border-radius: 8px;
  padding: 1.8rem 1.5rem;
  text-align: center;
  position: relative;
}

.landing-price-card.featured {
  border-color: var(--accent, #FF8700);
  border-width: 2px;
}

.landing-price-card.featured::before {
  content: "推荐";
  position: absolute;
  top: -10px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--accent, #FF8700);
  color: #fff;
  font-size: 0.75rem;
  padding: 2px 12px;
  border-radius: 10px;
}

.landing-price-tier {
  font-size: 1.25rem;
  font-weight: 600;
  margin-bottom: 0.5rem;
}

.landing-price-amount {
  font-size: 2.2rem;
  font-weight: 700;
  color: var(--accent, #FF8700);
  margin: 0.5rem 0;
}

.landing-price-amount small {
  font-size: 0.9rem;
  opacity: 0.7;
  font-weight: 400;
}

.landing-price-features {
  list-style: none;
  padding: 0;
  margin: 1rem 0 0 0;
  font-size: 0.9rem;
  text-align: left;
}

.landing-price-features li {
  padding: 0.3rem 0;
  border-bottom: 1px dashed rgba(128, 128, 128, 0.2);
}

.landing-price-features li::before {
  content: "✓ ";
  color: var(--accent, #FF8700);
  font-weight: 600;
}

.landing-cta {
  text-align: center;
  margin: 2rem 0;
  padding: 1.5rem;
  background: rgba(255, 135, 0, 0.05);
  border-radius: 8px;
  border: 1px dashed var(--accent, #FF8700);
}

.landing-cta-button {
  display: inline-block;
  background: var(--accent, #FF8700);
  color: #fff;
  padding: 0.8rem 2rem;
  border-radius: 6px;
  text-decoration: none;
  font-weight: 600;
  margin: 0.5rem;
  transition: opacity 0.2s;
}

.landing-cta-button:hover {
  opacity: 0.85;
}

.landing-cta-button.secondary {
  background: transparent;
  border: 1px solid var(--accent, #FF8700);
  color: var(--accent, #FF8700);
}

.landing-cta-note {
  font-size: 0.85rem;
  opacity: 0.75;
  margin-top: 0.8rem;
}

.landing-faq-item {
  border-bottom: 1px solid rgba(128, 128, 128, 0.2);
  padding: 1rem 0;
}

.landing-faq-q {
  font-weight: 600;
  margin-bottom: 0.4rem;
  cursor: pointer;
}

.landing-faq-q::before {
  content: "Q · ";
  color: var(--accent, #FF8700);
}

.landing-faq-a {
  font-size: 0.95rem;
  opacity: 0.85;
  line-height: 1.6;
}

.landing-faq-a::before {
  content: "A · ";
  color: var(--accent, #FF8700);
}
</style>
{{ end }}
